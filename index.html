<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalender Todo App</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="container">
            <h1 class="item">TodoKal</h1>
        </div>
    </header>

<!--==========================================================================================
                     SCHEMA-PANEL 
===============================================================================================-->



<main>
        <aside class="schema-panel">
        
          <!-- Rubrik -->
          <div class="schema-header">
            <span class="schema-icon">📋</span>
            <h2 class="schema-title">Lägg till</h2>
          </div>
        
          <!-- Form -->
          <div class="schema-form">
        
            <!-- Välj dag -->
            <select id="schema-dag" class="schema-select">
              <option value="">Välj dag...</option>
              <option value="måndag">Måndag</option>
              <option value="tisdag">Tisdag</option>
              <option value="onsdag">Onsdag</option>
              <option value="torsdag">Torsdag</option>
              <option value="fredag">Fredag</option>
              <option value="lördag">Lördag</option>
              <option value="söndag">Söndag</option>
            </select>
        
            <!-- Text -->
            <input
              type="text"
              id="schema-text"
              class="schema-input"
              placeholder="Vad händer? (t.ex. Jobbar)"
              maxlength="50"
            />
        
            <!-- Tid -->
            <div class="schema-tid">
              <input type="time" id="schema-fran" class="schema-time" value="08:00">
              <span class="tid-sep">till</span>
              <input type="time" id="schema-till" class="schema-time" value="15:00">
            </div>
        
            <!-- Knapp -->
            <button id="add-schema-btn" class="btn-schema">
              + Lägg till schema
            </button>
        
          </div>
        
          <!-- Lista -->
          <ul class="schema-lista" id="schema-lista"></ul>
        
        </aside>

        <!-- INSERT CALENDAR HERE -->

    </main>
    <script src="schema.js"></script>
<script>
  initSchema();
</script>
</body>
</html>
