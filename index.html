<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalender Todo App</title>
    
    <link rel="stylesheet" href="style.css">
  </head>
  
  <body>
    <header>
      <div class="container">
        <h1 class="item">TodoKal</h1>
      </div>
    </header>
      
<!--==========================================================================================
                     SCHEMA-PANEL 
============================================================================================-->
                     
  <main>
    <aside class="schema-panel">
      <section class="welcome">
        <h2 id="current-time"></h2>
        <p id="current-date"></p>
      </section>

    <!-- Rubrik -->
    <div class="schema-header">
      <span class="schema-icon">📋</span>
      <h2 class="schema-title">Schema</h2>
    </div>
    
    <!--Vald dag- visar när man klickar i kalendern-->
    <!--Börjar dold, JavaScript visar den-->
    <div class="schema-vald-dag" id="schema-vald-dag" style="display: none;">
      <span class="schema-dag-icon">📆</span>
      <span id="schema-dag-text">Ingen dag vald</span>
    </div>
    
    <!--Händelse för vald dag-->
    <ul class="schema-lista" id="schema-lista">
      <li class="schema-tomt">Klicka på en dag i kalendern</li>
    </ul>

    <!-- Formulär – alltid synligt -->
    <div class="schema-form">
      <div id="schema-dag-display" class="schema-dag-display hidden"></div>
      
      <!-- Dolt fält – sparar vald dag från KALENDERN -->
      <input type="hidden" id="schema-dag" value="" />
      
      <!-- Textfält -->
      <input
        type="text"
        id="schema-text"
        class="schema-input"
        placeholder="Vad händer? (t.ex. Jobbar)"
        maxlength="50"
      />
      
      <!-- Knapp -->
      <button id="add-schema-btn" class="btn-schema">
        + Lägg till schema
      </button>
      
    </div>

    <!-- Helgdag -->
    <button class="btn-helgdag">
      <span>🗓</span>
      Lägg till helgdag
      <span class="btn-plus">+</span>
    </button>
    <!-- Evenemang -->
    <button class="btn-evenemang">
      <span>📌</span>
      Lägg till evenemang
      <span class="btn-plus">+</span>
    </button>

    </aside>

  <div class="kalender-sektion">

  <div class="calendar-controls">
    <button id="prevMonth">←</button>
    <h2 id="monthLabel"></h2>
    <button id="nextMonth">→</button>
  </div>

  <div class="calendar-wrapper">
    <ol class="calendar" id="calendar">
      <li class="day-name">Mon</li>
      <li class="day-name">Tue</li>
      <li class="day-name">Wed</li>
      <li class="day-name">Thu</li>
      <li class="day-name">Fri</li>
      <li class="day-name">Sat</li>
      <li class="day-name">Sun</li>
    </ol>
  </div>

</div>

  </main>

  <script src="/js/calendar.js"></script>
</body>
</html>
